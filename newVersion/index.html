<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Calculator</title>
</head>
<body>
  <h1>Simple Calculator</h1>
  <div id="container">
    <input id="operation" type="text" placeholder="0">
    <button class="row" onclick="operate('percentage')">%</button>
    <button class="row" onclick="clearAll()">C</button>
    <button class="row" onclick="clearDigit()">D</button>
    <button class="row" onclick="operate('division')">/</button>
    <br>

    <button class="row" onclick="addDigit(7)">7</button>
    <button class="row" onclick="addDigit(8)">8</button>
    <button class="row" onclick="addDigit(9)">9</button>
    <button class="row" onclick="operate('multiplication')">*</button>
    <br>

    <button class="row" onclick="addDigit(4)">4</button>
    <button class="row" onclick="addDigit(5)">5</button>
    <button class="row" onclick="addDigit(6)">6</button>
    <button class="row" onclick="operate('add')">+</button>
    <br>

    <button class="row" onclick="addDigit(1)">1</button>
    <button class="row" onclick="addDigit(2)">2</button>
    <button class="row" onclick="addDigit(3)">3</button>
    <button class="row" onclick="operate('substract')">-</button>
    <br>

    <button class="row" onclick="operate('square')">S</button>
    <button class="row" onclick="addDigit(0)">0</button>
    <button class="row" onclick="addDigit('.')">.</button>
    <button class="row" onclick="operate('equal')">=</button>
  </div>

  <script src="./main.js"></script>
</body>
</html>
